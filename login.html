<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Eventos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h1 { font-size: 24px; margin-bottom: 8px; }
        .login-body { padding: 32px; }
        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 15px;
        }
        .form-control:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-login:hover { transform: translateY(-2px); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
            font-size: 14px;
        }
        .empresa-card {
            background: linear-gradient(135deg, #e8f4fd, #d1ecf1);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            border-left: 4px solid #28a745;
        }
        .empresa-card h3 { color: #155724; margin-bottom: 5px; font-size: 18px; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .login-footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1>🎪 Sistema de Eventos</h1>
            <p>Acesso restrito por empresa</p>
        </div>
        <div class="login-body">
            <div class="empresa-card" id="empresaCard">
                <h3 id="empresaNome">Carregando...</h3>
                <p>Digite suas credenciais de acesso</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Login</label>
                    <input type="text" id="username" class="form-control" placeholder="Digite seu login" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" class="form-control" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">ENTRAR</button>
                <div id="errorMsg" class="error-message"></div>
            </form>
        </div>
        <div class="login-footer">
            <p>© 2026 Sistema de Eventos - Todos os direitos reservados</p>
        </div>
    </div>

    <script>
    const PASTA_SISTEMA = 'EMPRESA 1';
    
    console.log(`🚀 Sistema inicializado - PASTA: ${PASTA_SISTEMA}`);
    
    function carregarNomeEmpresa() {
        const usuariosApp = JSON.parse(localStorage.getItem('matriz_usuarios_app_autorizados') || '[]');
        const empresaNaPasta = usuariosApp.find(u => u.pasta === PASTA_SISTEMA);
        const empresaNomeSpan = document.getElementById('empresaNome');
        
        if (empresaNaPasta) {
            empresaNomeSpan.textContent = empresaNaPasta.nome;
            console.log(`✅ Empresa: ${empresaNaPasta.nome}`);
        } else {
            empresaNomeSpan.textContent = PASTA_SISTEMA;
            console.warn(`⚠️ Nenhuma empresa na pasta ${PASTA_SISTEMA}`);
        }
    }

    // ==================== FUNÇÃO PARA AUTENTICAR FUNCIONÁRIO ====================
    function autenticarFuncionario(login, senha) {
        try {
            const pasta = PASTA_SISTEMA;
            const usuariosKey = `usuarios_sistema_${pasta}`;
            const usuarios = JSON.parse(localStorage.getItem(usuariosKey) || '[]');
            
            console.log(`🔍 Buscando funcionário na chave: ${usuariosKey}`);
            console.log(`📋 Total de funcionários cadastrados: ${usuarios.length}`);
            
            // Buscar por login e status ativo
            const funcionario = usuarios.find(u => u.login === login && u.status === 'ativo');
            
            if (!funcionario) {
                console.log(`❌ Funcionário não encontrado ou inativo: ${login}`);
                return null;
            }
            
            // Validar senha
            if (funcionario.senha !== senha) {
                console.log(`❌ Senha incorreta para funcionário: ${login}`);
                return null;
            }
            
            console.log(`✅ Funcionário autenticado: ${funcionario.nome} (${funcionario.cargo || 'sem cargo'})`);
            
            return {
                id: funcionario.id,
                nome: funcionario.nome,
                login: funcionario.login,
                cargo: funcionario.cargo || 'funcionario',
                tipo: 'funcionario',
                pasta: pasta,
                status: funcionario.status
            };
        } catch(e) {
            console.error('Erro ao autenticar funcionário:', e);
            return null;
        }
    }

    // ==================== FUNÇÃO PARA AUTENTICAR EMPRESA ====================
    function autenticarEmpresa(login, senha) {
        const loginDigitado = (login || '').trim();
        const senhaDigitada = (senha || '').trim();
        
        console.log(`🔍 Autenticando empresa: ${loginDigitado}`);
        
        const usuariosApp = JSON.parse(localStorage.getItem('matriz_usuarios_app_autorizados') || '[]');
        const usuario = usuariosApp.find(u => u.login === loginDigitado && u.pasta === PASTA_SISTEMA);
        
        if (!usuario) {
            console.log(`❌ Empresa não encontrada: ${login}`);
            return null;
        }
        
        if (usuario.status_acesso === 'bloqueado') {
            console.log(`❌ Empresa bloqueada: ${login}`);
            return null;
        }
        
        if (usuario.senha !== senhaDigitada) {
            console.log(`❌ Senha incorreta para empresa: ${login}`);
            return null;
        }
        
        const isProvisoria = usuario.senha_provisoria === true;
        console.log(`✅ Empresa autenticada: ${usuario.nome}`);
        
        return {
            id: usuario.id,
            nome: usuario.nome,
            login: usuario.login,
            senha_provisoria: isProvisoria,
            pasta: PASTA_SISTEMA,
            tipo: 'empresa'
        };
    }

    // ==================== FUNÇÃO DE LOGIN COMBINADA ====================
    function realizarLogin(login, senha) {
        // 1º TENTA: Funcionário (Cadastro de Usuários do Sistema)
        const funcionario = autenticarFuncionario(login, senha);
        if (funcionario) {
            console.log(`🎉 Login como FUNCIONÁRIO: ${funcionario.nome}`);
            return {
                success: true,
                usuario: funcionario,
                precisaTrocarSenha: false
            };
        }
        
        // 2º TENTA: Empresa (matriz_usuarios_app_autorizados)
        const empresa = autenticarEmpresa(login, senha);
        if (empresa) {
            console.log(`🎉 Login como EMPRESA: ${empresa.nome}`);
            return {
                success: true,
                usuario: empresa,
                precisaTrocarSenha: empresa.senha_provisoria === true
            };
        }
        
        // NENHUM dos dois funcionou
        return { 
            success: false, 
            message: '❌ Login ou senha incorretos!' 
        };
    }

    // ==================== EVENTO DE LOGIN ====================
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById('btnLogin');
        const errorMsg = document.getElementById('errorMsg');
        const loading = document.getElementById('loadingOverlay');
        
        if (!username || !password) {
            errorMsg.textContent = !username ? '❌ Digite o login!' : '❌ Digite a senha!';
            errorMsg.style.display = 'block';
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'VERIFICANDO...';
        loading.style.display = 'flex';
        errorMsg.style.display = 'none';
        
        setTimeout(() => {
            // CHAMA A FUNÇÃO COMBINADA
            const result = realizarLogin(username, password);
            loading.style.display = 'none';
            
            if (!result.success) {
                errorMsg.textContent = result.message;
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'ENTRAR';
                document.getElementById('password').value = '';
                return;
            }
            
            console.log(`✅ Login bem-sucedido: ${result.usuario.nome} (${result.usuario.tipo})`);
            
            // Salvar na sessão
            sessionStorage.setItem('empresa_logada', JSON.stringify(result.usuario));
            sessionStorage.setItem('pasta_atual', PASTA_SISTEMA);
            sessionStorage.removeItem('admin_logado');
            sessionStorage.removeItem('usuario_logado_app');
            sessionStorage.removeItem('usuario_app_logado');
            
            // Definir usuario_logado para o sistema de mensagens
            if (result.usuario.tipo === 'funcionario') {
                sessionStorage.setItem('usuario_logado', result.usuario.login);
            } else {
                sessionStorage.setItem('usuario_logado', 'admin');
            }
            
            // Atualizar último acesso (apenas para empresa)
            if (result.usuario.tipo === 'empresa') {
                const usuariosApp = JSON.parse(localStorage.getItem('matriz_usuarios_app_autorizados') || '[]');
                const userIndex = usuariosApp.findIndex(u => u.id === result.usuario.id);
                if (userIndex !== -1) {
                    usuariosApp[userIndex].ultimo_acesso = new Date().toISOString();
                    localStorage.setItem('matriz_usuarios_app_autorizados', JSON.stringify(usuariosApp));
                }
            }
            
            // Redirecionar
            if (result.precisaTrocarSenha === true) {
                console.log('🔐 Senha provisória - redirecionando para troca de senha');
                btn.textContent = 'REDIRECIONANDO...';
                window.location.href = `../mudar-senha-empresa.html?login=${encodeURIComponent(result.usuario.login)}&pasta=${encodeURIComponent(PASTA_SISTEMA)}&token=primeiro_acesso&id=${result.usuario.id}&nome=${encodeURIComponent(result.usuario.nome)}`;
            } else {
                console.log('🏠 Acessando sistema');
                btn.textContent = 'ENTRANDO...';
                window.location.href = 'index.html';
            }
        }, 500);
    });
    
    sessionStorage.removeItem('empresa_logada');
    sessionStorage.removeItem('admin_logado');
    carregarNomeEmpresa();
    
    document.getElementById('username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') document.getElementById('btnLogin').click();
    });
    
    console.log('✅ Login page carregada');
</script>
</body>
</html>
